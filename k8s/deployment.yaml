apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-park
  namespace: legacy-park
  labels:
    app: legacy-park
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legacy-park
  template:
    metadata:
      labels:
        app: legacy-park
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
      volumes:
        - name: html
          configMap:
            name: legacy-park-html
        - name: nginx-conf
          configMap:
            name: legacy-park-nginx-conf
