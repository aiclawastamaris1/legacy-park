    .sport-tag.open{background:#dbeafe;color:#1e40af}\n.sport-body h3{font-family:'Playfair\
    \ Display',serif;font-size:1.45rem;font-weight:700;color:var(--gd)}\n.sport-body\
    \ p{font-size:.88rem;color:var(--muted);line-height:1.7;flex-grow:1}\n.sport-details{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;background:var(--bg);border-radius:10px;padding:16px}\n\
    .sd h4{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}\n\
    .sd p{font-size:.86rem;color:var(--text);line-height:1.45}\n.sd a{color:var(--gm);text-decoration:none;font-weight:500}.sd\
    \ a:hover{text-decoration:underline}\n.sport-actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}\n\
    @media(max-width:860px){.sport-card-inner{grid-template-columns:1fr}.sport-img{height:200px}}\n\
    \n/* INFO BAND */\n.info-band{background:#0e2219;padding:60px 40px}\n.info-grid{max-width:1180px;margin:0\
    \ auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:36px}\n\
    .info-panel h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gl2);margin-bottom:14px}\n\
    .info-panel p,.info-panel li{color:rgba(255,255,255,.62);font-size:.87rem;line-height:1.75}\n\
    .info-panel ul{list-style:none}\n.info-panel li{padding:2px 0}\n.info-panel li::before{content:'→\
    \ ';color:var(--gl)}\n.info-panel a{color:var(--gl2);text-decoration:none}.info-panel\
    \ a:hover{text-decoration:underline}\n\n/* ALERT */\n.alert{background:var(--gp);border-left:4px\
    \ solid var(--gl);border-radius:10px;padding:14px 20px;color:var(--gd);font-size:.88rem;margin-bottom:44px;line-height:1.6}\n\
