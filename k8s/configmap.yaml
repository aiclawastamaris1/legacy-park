  contact.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"\
    ><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Contact\
    \ &amp; Staff — Legacy Park</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"\
    >\n<link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap\"\
    \ rel=\"stylesheet\">\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n\
    :root{--gd:#1a3d2b;--gm:#2d6a4f;--gl:#52b788;--gp:#d8f3dc;--gold:#c9a84c;--gl2:#f0d080;--cream:#fdf8f0;--text:#1c2b20;--muted:#5a7065;--white:#fff;--shadow:0\
    \ 4px 24px rgba(0,0,0,.08);--r:16px}\nhtml{scroll-behavior:smooth}\nbody{font-family:'Inter',sans-serif;background:var(--cream);color:var(--text);line-height:1.6}\n\
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0\
    \ 40px;height:68px;background:rgba(26,61,43,.97);backdrop-filter:blur(12px);border-bottom:1px\
    \ solid rgba(255,255,255,.08)}\n.nav-brand{display:flex;align-items:center;gap:12px;text-decoration:none}\n\
    .nav-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gl),var(--gold));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}\n\
    .nav-name{color:#fff;font-weight:700;font-size:1rem;line-height:1.2}\n.nav-sub{color:rgba(255,255,255,.45);font-size:.7rem}\n\
    .nav-links{display:flex;align-items:center;gap:4px;list-style:none}\n.nav-links\
    \ a{color:rgba(255,255,255,.75);text-decoration:none;padding:7px 13px;border-radius:8px;font-size:.88rem;transition:.2s}\n\
    .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.1);color:#fff}\n\
    .nav-links .cta{background:var(--gold);color:var(--gd)!important;font-weight:700}\n\
    .nav-links .cta:hover{background:var(--gl2)}\nsection{padding:80px 40px}\n.container{max-width:1200px;margin:0\
    \ auto}\n.s-label{display:inline-flex;align-items:center;gap:8px;color:var(--gm);font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}\n\
    .s-label::before{content:'';width:22px;height:2px;background:var(--gl);border-radius:2px}\n\
    h2{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,3.5vw,2.5rem);font-weight:700;color:var(--gd);line-height:1.2;margin-bottom:14px}\n\
    .s-desc{color:var(--muted);font-size:1rem;max-width:580px;margin-bottom:44px}\n\
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:11px;font-weight:600;font-size:.9rem;text-decoration:none;border:none;cursor:pointer;transition:all\
    \ .2s;white-space:nowrap}\n.btn-primary{background:var(--gold);color:var(--gd)}\n\
    .btn-primary:hover{background:var(--gl2);transform:translateY(-2px)}\n.btn-green{background:var(--gm);color:#fff}\n\
    .btn-green:hover{background:var(--gd);transform:translateY(-2px)}\n.btn-outline{background:transparent;color:var(--gm);border:2px\
    \ solid var(--gm)}\n.btn-outline:hover{background:var(--gp)}\nfooter{background:#111d17;color:rgba(255,255,255,.45);padding:36px\
    \ 40px}\n.footer-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}\n\
    footer p{font-size:.83rem}\n.footer-links{display:flex;gap:20px}\n.footer-links\
    \ a{color:rgba(255,255,255,.45);text-decoration:none;font-size:.83rem}\n.footer-links\
    \ a:hover{color:var(--gl)}\n@media(max-width:768px){nav{padding:0 18px}.nav-links{display:none}section{padding:56px\
    \ 20px}footer{padding:28px 20px}}\n\n.page-hero{background:linear-gradient(135deg,var(--gd),#1f5c3a);padding:120px\
    \ 40px 64px}\n.page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.2rem,4.5vw,3.4rem);font-weight:900;color:#fff;margin-bottom:12px}\n\
    .page-hero p{color:rgba(255,255,255,.7);font-size:1.05rem;max-width:540px}\n.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;font-size:.83rem}\n\
    .breadcrumb a{color:rgba(255,255,255,.55);text-decoration:none}\n.breadcrumb span{color:rgba(255,255,255,.3)}\n\
    \n/* CONTACT CARDS */\n.contact-top{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:48px}\n\
    .contact-card{background:#fff;border-radius:var(--r);padding:36px;border:1.5px\
    \ solid #e8f0e8;box-shadow:var(--shadow)}\n.contact-card h3{font-family:'Playfair\
    \ Display',serif;font-size:1.3rem;color:var(--gd);margin-bottom:20px;display:flex;align-items:center;gap:10px}\n\
    .ci{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}\n.ci-icon{width:40px;height:40px;background:var(--gp);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}\n\
    .ci-body strong{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}\n\
    .ci-body a,.ci-body span{color:var(--text);text-decoration:none;font-size:.93rem;line-height:1.5}\n\
    .ci-body a{color:var(--gm)}\n.ci-body a:hover{text-decoration:underline}\n.hours-grid{display:grid;grid-template-columns:1fr\
    \ 1fr;gap:12px;margin-top:8px}\n.hour-item{background:var(--gp);border-radius:10px;padding:12px\
    \ 14px}\n.hour-item .day{font-size:.75rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:4px}\n\
    .hour-item .time{font-size:.95rem;font-weight:600;color:var(--gd)}\n\n/* STAFF\
    \ TABLE */\ntable{width:100%;border-collapse:collapse;font-size:.9rem;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}\n\
    th{background:var(--gd);color:#fff;padding:14px 20px;text-align:left;font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}\n\
    td{padding:16px 20px;border-bottom:1px solid #e8f0e8;color:var(--text);vertical-align:top}\n\
    tr:last-child td{border-bottom:none}\ntr:hover td{background:#f6fbf6}\ntd a{color:var(--gm);text-decoration:none;font-weight:500}\n\
    td a:hover{text-decoration:underline}\n.role-badge{display:inline-block;padding:3px\
    \ 10px;border-radius:100px;font-size:.75rem;font-weight:600;background:var(--gp);color:var(--gm)}\n\
    \n/* MAP EMBED PLACEHOLDER */\n.map-strip{background:var(--gd);padding:56px 40px}\n\
    .map-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr\
    \ 1fr;gap:40px;align-items:center}\n.map-text h2{color:#fff;margin-bottom:14px}\n\
    .map-text p{color:rgba(255,255,255,.7);font-size:.95rem;margin-bottom:24px;line-height:1.7}\n\
    .map-text .info-item{display:flex;align-items:center;gap:12px;margin-bottom:10px;color:rgba(255,255,255,.75);font-size:.9rem}\n\
    .map-text .info-item a{color:var(--gl2);text-decoration:none}\n.map-embed{background:rgba(255,255,255,.05);border:1px\
    \ solid rgba(255,255,255,.1);border-radius:14px;height:260px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}\n\
    .map-embed p{color:rgba(255,255,255,.4);font-size:.85rem}\n\n.info-band{background:var(--gd);padding:56px\
    \ 40px}\n.info-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:32px}\n\
    .info-panel h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gl2);margin-bottom:12px}\n\
    .info-panel p,.info-panel li{color:rgba(255,255,255,.7);font-size:.88rem;line-height:1.7}\n\
    .info-panel ul{list-style:none}\n.info-panel li{padding:3px 0}\n.info-panel li::before{content:'→\
    \ ';color:var(--gl)}\n.info-panel a{color:var(--gl2);text-decoration:none}\n.info-panel\
    \ a:hover{text-decoration:underline}\n@media(max-width:900px){.contact-top{grid-template-columns:1fr}.map-inner{grid-template-columns:1fr}}\n\
    </style>\n</head>\n<body>\n\n<nav>\n  <a href=\"/\" class=\"nav-brand\">\n   \
    \ <div class=\"nav-logo\">\U0001F333</div>\n    <div><div class=\"nav-name\">Legacy\
    \ Park</div><div class=\"nav-sub\">Kennesaw, GA</div></div>\n  </a>\n  <ul class=\"\
    nav-links\">\n    <li><a href=\"/\">Home</a></li>\n    <li><a href=\"/sports.html\"\
    >Sports</a></li>\n    <li><a href=\"/residents.html\">Residents</a></li>\n   \
    \ <li><a href=\"/contact.html\" class=\"active\">Contact</a></li>\n    <li><a\
    \ href=\"https://legacypark.org/newsletters\" target=\"_blank\">Newsletter</a></li>\n\
    \    <li><a href=\"https://legacypark.org/event-calendar\" target=\"_blank\">Calendar</a></li>\n\
    \    <li><a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"cta btn\">Owner Portal</a></li>\n  </ul>\n</nav>\n\
    \n<div class=\"page-hero\">\n  <div class=\"container\">\n    <div class=\"breadcrumb\"\
    ><a href=\"/\">Home</a><span>/</span><span style=\"color:#fff\">Contact &amp;\
    \ Staff</span></div>\n    <h1>\U0001F4DE Contact Us</h1>\n    <p>The HOA office,\
    \ staff directory, board contact, and everything you need to reach the right person\
    \ at Legacy Park.</p>\n  </div>\n</div>\n\n<!-- CONTACT + HOURS -->\n<section\
    \ style=\"background:#fff\">\n  <div class=\"container\">\n    <div class=\"contact-top\"\
    >\n      <div class=\"contact-card\">\n        <h3>\U0001F4CD HOA Office</h3>\n\
    \        <div class=\"ci\">\n          <div class=\"ci-icon\">\U0001F4CD</div>\n\
    \          <div class=\"ci-body\"><strong>Address</strong><span>4201 Legacy Park\
    \ Circle<br>Kennesaw, GA 30144<br><em style=\"font-size:.82rem;color:var(--muted)\"\
    >(Lower level of the Clubhouse)</em></span></div>\n        </div>\n        <div\
    \ class=\"ci\">\n          <div class=\"ci-icon\">\U0001F4DE</div>\n         \
    \ <div class=\"ci-body\"><strong>Phone</strong><a href=\"tel:7709192556\">(770)\
    \ 919-2556</a></div>\n        </div>\n        <div class=\"ci\">\n          <div\
    \ class=\"ci-icon\">\U0001F4E0</div>\n          <div class=\"ci-body\"><strong>Fax</strong><span>(770)\
    \ 919-0066</span></div>\n        </div>\n        <div class=\"ci\">\n        \
    \  <div class=\"ci-icon\">✉️</div>\n          <div class=\"ci-body\"><strong>General\
    \ Email</strong><a href=\"mailto:HOAoffice@LegacyPark.org\">HOAoffice@LegacyPark.org</a></div>\n\
    \        </div>\n        <div class=\"ci\">\n          <div class=\"ci-icon\"\
    >\U0001F4CB</div>\n          <div class=\"ci-body\"><strong>Board of Directors</strong><a\
    \ href=\"mailto:boardmembers@legacypark.org\">boardmembers@legacypark.org</a></div>\n\
    \        </div>\n        <div style=\"margin-top:20px\">\n          <a href=\"\
    https://legacypark.managebuilding.com/Resident/portal/login\" target=\"_blank\"\
    \ class=\"btn btn-primary\" style=\"margin-right:10px;margin-bottom:10px\">Owner\
    \ Portal →</a>\n          <a href=\"mailto:HOAoffice@LegacyPark.org\" class=\"\
    btn btn-outline\">Email Office →</a>\n        </div>\n      </div>\n      <div\
    \ class=\"contact-card\">\n        <h3>\U0001F550 Office Hours</h3>\n        <div\
    \ class=\"hours-grid\">\n          <div class=\"hour-item\">\n            <div\
    \ class=\"day\">Mon – Fri</div>\n            <div class=\"time\">10:00 AM – 2:00\
    \ PM</div>\n          </div>\n          <div class=\"hour-item\">\n          \
    \  <div class=\"day\">1st Saturday</div>\n            <div class=\"time\">9:00\
    \ AM – 11:00 AM</div>\n          </div>\n        </div>\n        <p style=\"margin-top:20px;font-size:.88rem;color:var(--muted);line-height:1.6\"\
    >Appointments are available outside regular office hours. Please call <a href=\"\
    tel:7709192556\" style=\"color:var(--gm)\">(770) 919-2556</a> or email <a href=\"\
    mailto:HOAoffice@LegacyPark.org\" style=\"color:var(--gm)\">HOAoffice@LegacyPark.org</a>\
    \ to schedule.</p>\n        <div style=\"margin-top:24px;padding:16px;background:var(--gp);border-radius:12px\"\
    >\n          <h4 style=\"font-size:.88rem;font-weight:700;color:var(--gd);margin-bottom:8px\"\
    >\U0001F4C5 Board Meetings</h4>\n          <p style=\"font-size:.85rem;color:var(--muted);line-height:1.6\"\
    >\n            <strong style=\"color:var(--gd)\">2nd Tuesday:</strong> Planning\
    \ Meeting — 6:30 PM<br>\n            <strong style=\"color:var(--gd)\">4th Tuesday:</strong>\
    \ Board Meeting — 6:30 PM<br>\n            <em>Location: Legacy Park Clubhouse.\
    \ Residents welcome and encouraged to attend.</em>\n          </p>\n        </div>\n\
    \      </div>\n    </div>\n  </div>\n</section>\n\n<!-- STAFF -->\n<section style=\"\
    background:var(--gp)\">\n  <div class=\"container\">\n    <div class=\"s-label\"\
    >HOA Staff</div>\n    <h2>Staff Directory</h2>\n    <p class=\"s-desc\">Reach\
    \ the right person directly. Our team is here to help with all community needs.</p>\n\
    \    <table>\n      <thead><tr><th>Role</th><th>Name</th><th>Email</th></tr></thead>\n\
    \      <tbody>\n        <tr>\n          <td><span class=\"role-badge\">Property\
    \ Manager</span></td>\n          <td style=\"font-weight:600\">Candace Cole</td>\n\
    \          <td><a href=\"mailto:propertymanager@legacypark.org\">propertymanager@legacypark.org</a></td>\n\
    \        </tr>\n        <tr>\n          <td><span class=\"role-badge\">Asst. Property\
    \ Manager</span></td>\n          <td style=\"font-weight:600\">Alexandra Smith</td>\n\
    \          <td><a href=\"mailto:assistantmanager@legacypark.org\">assistantmanager@legacypark.org</a></td>\n\
    \        </tr>\n        <tr>\n          <td><span class=\"role-badge\">Covenant\
    \ Enforcement</span></td>\n          <td style=\"font-weight:600\">Joanne Yaeger-Hart</td>\n\
    \          <td><a href=\"mailto:joannew@legacypark.org\">joannew@legacypark.org</a></td>\n\
    \        </tr>\n        <tr>\n          <td><span class=\"role-badge\">Activities\
    \ &amp; Sports</span></td>\n          <td style=\"font-weight:600\">Michelle Melton</td>\n\
    \          <td><a href=\"mailto:activitiesdirector@legacypark.org\">activitiesdirector@legacypark.org</a></td>\n\
    \        </tr>\n        <tr>\n          <td><span class=\"role-badge\">Office\
    \ Assistant</span></td>\n          <td style=\"font-weight:600\">Danielle Denton</td>\n\
    \          <td><a href=\"mailto:officeassistant@legacypark.org\">officeassistant@legacypark.org</a></td>\n\
    \        </tr>\n      </tbody>\n    </table>\n  </div>\n</section>\n\n<!-- COMMITTEES\
    \ -->\n<section style=\"background:#fff\">\n  <div class=\"container\">\n    <div\
    \ class=\"s-label\">Volunteer Committees</div>\n    <h2>Committee Contacts</h2>\n\
    \    <p class=\"s-desc\">Each committee has openings for new members. Get involved\
    \ and make a difference in your neighborhood.</p>\n    <table>\n      <thead><tr><th>Committee</th><th>Contact</th><th>Email</th></tr></thead>\n\
    \      <tbody>\n        <tr><td>Election Committee</td><td>Deacon Robert Henry</td><td><a\
    \ href=\"mailto:elections@legacypark.org\">elections@legacypark.org</a></td></tr>\n\
    \        <tr><td>Finance Committee</td><td>Annette Hunter</td><td><a href=\"mailto:ahunter.hats@gmail.com\"\
    >ahunter.hats@gmail.com</a></td></tr>\n        <tr><td>Activities Committee</td><td>Michelle\
    \ Melton</td><td><a href=\"mailto:activitiesdirector@legacypark.org\">activitiesdirector@legacypark.org</a></td></tr>\n\
    \        <tr><td>Pickleball Committee</td><td>Betsy Raglin</td><td><a href=\"\
    mailto:pickleball@legacypark.org\">pickleball@legacypark.org</a></td></tr>\n \
    \       <tr><td>Tennis Committee</td><td>Stacey Tuchmann</td><td><a href=\"mailto:tennis@legacypark.org\"\
    >tennis@legacypark.org</a></td></tr>\n        <tr><td>Cub Scout Pack 002</td><td>Cubmaster</td><td><a\
    \ href=\"mailto:cubmaster@pack002.com\">cubmaster@pack002.com</a></td></tr>\n\
    \        <tr><td>Boy Scout Troop 002</td><td>Scoutmaster</td><td><a href=\"mailto:scoutmaster@troop002.org\"\
    >scoutmaster@troop002.org</a></td></tr>\n      </tbody>\n    </table>\n    <div\
    \ style=\"margin-top:24px\">\n      <a href=\"/residents.html\" class=\"btn btn-green\"\
    >New Resident Info →</a>\n    </div>\n  </div>\n</section>\n\n<!-- MAP -->\n<div\
    \ class=\"map-strip\">\n  <div class=\"map-inner\">\n    <div class=\"map-text\"\
    >\n      <h2>Find Us</h2>\n      <p>The HOA office is located at the lower level\
    \ of the Legacy Park Clubhouse — the main community hub for all resident services.</p>\n\
    \      <div class=\"map-text info-item\">\U0001F4CD <span>4201 Legacy Park Circle,\
    \ Kennesaw, GA 30144</span></div>\n      <div class=\"map-text info-item\">\U0001F4DE\
    \ <a href=\"tel:7709192556\">(770) 919-2556</a></div>\n      <div style=\"margin-top:20px\"\
    >\n        <a href=\"https://maps.google.com/maps/search/Legacy+Park+HOA+4201+Legacy+Park+Circle+Kennesaw+GA\"\
    \ target=\"_blank\" class=\"btn btn-primary\">Open in Google Maps →</a>\n    \
    \  </div>\n    </div>\n    <div class=\"map-embed\">\n      <div style=\"font-size:3rem\"\
    >\U0001F4CD</div>\n      <p>4201 Legacy Park Circle<br>Kennesaw, GA 30144</p>\n\
    \      <a href=\"https://maps.google.com/maps/search/Legacy+Park+HOA+4201+Legacy+Park+Circle+Kennesaw+GA\"\
    \ target=\"_blank\" style=\"color:var(--gl2);font-size:.85rem;text-decoration:none\"\
    >Open in Google Maps →</a>\n    </div>\n  </div>\n</div>\n\n<div class=\"info-band\"\
    >\n  <div class=\"info-grid\">\n    <div class=\"info-panel\"><h3>\U0001F511 Owner\
    \ Portal</h3><p>Pay assessments, submit requests, access meeting minutes, and\
    \ manage account preferences.<br><br><a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    >Login to Owner Portal →</a></p></div>\n    <div class=\"info-panel\"><h3>\U0001F4DA\
    \ Knowledge Base</h3><p>Governing documents, policies, modification forms, clubhouse\
    \ rental agreements — fully searchable.<br><br><a href=\"https://legacypark.org/knowledge-base\"\
    >Browse Knowledge Base →</a></p></div>\n    <div class=\"info-panel\"><h3>\U0001F4C5\
    \ Events</h3><p>Full-time Activities Director manages events throughout the year.\
    \ Most are free for all residents.<br><br><a href=\"https://legacypark.org/event-calendar\"\
    >View Events Calendar →</a></p></div>\n    <div class=\"info-panel\"><h3>⚽ Sports</h3><p>Soccer,\
    \ Tennis, Pickleball, T-Ball, Volleyball, and Travel Soccer programs for all ages.<br><br><a\
    \ href=\"/sports.html\">All Sports Programs →</a></p></div>\n  </div>\n</div>\n\
    \n<footer>\n  <div class=\"footer-inner\">\n    <p>© 2025 Legacy Park Community\
    \ Association · 4201 Legacy Park Circle, Kennesaw, GA 30144 · <a href=\"tel:7709192556\"\
    \ style=\"color:var(--gl)\">(770) 919-2556</a></p>\n    <div class=\"footer-links\"\
    >\n      <a href=\"/\">Home</a><a href=\"/sports.html\">Sports</a><a href=\"/residents.html\"\
    >Residents</a><a href=\"/contact.html\">Contact</a>\n      <a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\">Owner Portal</a>\n    </div>\n  </div>\n</footer>\n</body></html>\n"
