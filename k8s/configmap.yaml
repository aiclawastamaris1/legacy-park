    \ target=\"_blank\">Complete the waiver form →</a></p>\n        </div>\n     \
    \ </div>\n      <div class=\"step\">\n        <div class=\"step-num\">2</div>\n\
    \        <div class=\"step-body\">\n          <h3>Visit the HOA Office for Your\
    \ Welcome Packet</h3>\n          <p>Stop by 4201 Legacy Park Circle (lower level\
