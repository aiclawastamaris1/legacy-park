    \ center/cover;position:relative}\n.split-img::after{content:'';position:absolute;inset:0;background:rgba(15,35,22,.25)}\n\
    .split-content{background:var(--gd);padding:48px 44px;display:flex;flex-direction:column;gap:16px;justify-content:center}\n\
    .split-content h2{color:#fff;margin-bottom:4px;font-size:2rem}\n.split-content\
