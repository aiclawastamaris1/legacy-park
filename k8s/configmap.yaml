  contact.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\"\
    ><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\n<title>Contact\
    \ &amp; Staff — Legacy Park</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"\
    >\n<link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap\"\
    \ rel=\"stylesheet\">\n<style>\n*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}\n\
    :root{--gd:#1a3d2b;--gm:#2d6a4f;--gl:#52b788;--gp:#d8f3dc;--gold:#c9a84c;--gl2:#f0d080;--bg:#f7f9f7;--text:#111c16;--muted:#4a6355;--shadow:0\
    \ 4px 28px rgba(0,0,0,.10);--r:14px}\nhtml{scroll-behavior:smooth}\nbody{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.65}\n\
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0\
    \ 36px;height:66px;background:rgba(20,46,32,.96);backdrop-filter:blur(14px);border-bottom:1px\
    \ solid rgba(255,255,255,.07)}\n.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none}\n\
    .nav-logo{width:36px;height:36px;border-radius:10px;object-fit:cover}\n.nav-name{color:#fff;font-weight:700;font-size:.97rem;line-height:1.15}\n\
    .nav-sub{color:rgba(255,255,255,.4);font-size:.68rem}\n.nav-links{display:flex;align-items:center;gap:2px;list-style:none}\n\
    .nav-links a{color:rgba(255,255,255,.72);text-decoration:none;padding:7px 12px;border-radius:8px;font-size:.86rem;font-weight:500;transition:.18s}\n\
    .nav-links a:hover,.nav-links a.active{background:rgba(255,255,255,.1);color:#fff}\n\
    .nav-links .portal{background:var(--gold);color:#1a2e12!important;font-weight:700;padding:7px\
    \ 16px;border-radius:8px}\nsection{padding:80px 40px}\n.container{max-width:1180px;margin:0\
    \ auto}\n.s-eyebrow{display:inline-flex;align-items:center;gap:8px;color:var(--gm);font-weight:700;font-size:.73rem;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}\n\
    .s-eyebrow::before{content:'';width:20px;height:2px;background:var(--gl);border-radius:2px}\n\
    h2{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,3.5vw,2.6rem);font-weight:700;color:var(--gd);line-height:1.15;margin-bottom:12px}\n\
    .s-sub{color:var(--muted);font-size:1rem;max-width:560px;margin-bottom:44px;line-height:1.7}\n\
    .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:11px;font-weight:600;font-size:.9rem;text-decoration:none;border:none;cursor:pointer;transition:all\
    \ .2s;white-space:nowrap}\n.btn-green{background:var(--gm);color:#fff}.btn-green:hover{background:var(--gd);transform:translateY(-2px)}\n\
    .btn-gold{background:var(--gold);color:#1a2e12}.btn-gold:hover{background:#ddb94a;transform:translateY(-2px)}\n\
    .btn-outline{background:transparent;color:var(--gm);border:2px solid var(--gm)}.btn-outline:hover{background:var(--gp)}\n\
    footer{background:#091510;color:rgba(255,255,255,.4);padding:28px 40px}\n.footer-inner{max-width:1180px;margin:0\
    \ auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}\n\
    footer p{font-size:.8rem}.footer-links{display:flex;gap:18px}\n.footer-links a{color:rgba(255,255,255,.38);text-decoration:none;font-size:.8rem}.footer-links\
    \ a:hover{color:var(--gl)}\n@media(max-width:768px){nav{padding:0 18px}.nav-links{display:none}section{padding:56px\
    \ 20px}footer{padding:24px 20px}}\n\n/* PAGE HERO */\n.page-hero{position:relative;padding:130px\
    \ 40px 70px;overflow:hidden}\n.page-hero-bg{position:absolute;inset:0;background:url('https://legacypark.org/wp-content/uploads/2025/11/Gym-1-1024x768.jpg')\
    \ center/cover no-repeat;filter:brightness(.35)}\n.page-hero::after{content:'';position:absolute;inset:0;background:rgba(10,30,18,.60)}\n\
    .page-hero-inner{position:relative;z-index:2;max-width:1180px;margin:0 auto}\n\
    .breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-size:.82rem}\n\
    .breadcrumb a{color:rgba(255,255,255,.55);text-decoration:none}\n.breadcrumb span{color:rgba(255,255,255,.28)}\n\
    .page-hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,5vw,3.6rem);font-weight:900;color:#fff;margin-bottom:12px}\n\
    .page-hero p{color:rgba(255,255,255,.72);font-size:1.05rem;max-width:560px;line-height:1.7}\n\
    \n/* CONTACT TOP GRID */\n.contact-top{display:grid;grid-template-columns:1.1fr\
    \ 1fr;gap:24px;margin-bottom:60px}\n.contact-card{background:#fff;border-radius:var(--r);padding:36px;border:1.5px\
    \ solid #dde8de;box-shadow:0 2px 16px rgba(0,0,0,.06)}\n.contact-card h3{font-family:'Playfair\
    \ Display',serif;font-size:1.3rem;color:var(--gd);margin-bottom:22px}\n.ci{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}\n\
    .ci-icon{width:40px;height:40px;background:var(--gp);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}\n\
    .ci-label{font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px}\n\
    .ci-val{color:var(--text);font-size:.9rem;line-height:1.5}\n.ci-val a{color:var(--gm);text-decoration:none}.ci-val\
    \ a:hover{text-decoration:underline}\n.hour-grid{display:grid;grid-template-columns:1fr\
    \ 1fr;gap:12px;margin-top:6px}\n.hour-item{background:var(--bg);border-radius:10px;padding:14px}\n\
    .hour-item .day{font-size:.71rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.5px;margin-bottom:5px}\n\
    .hour-item .time{font-size:.93rem;font-weight:700;color:var(--gd)}\n.board-note{background:var(--gp);border-radius:10px;padding:16px;margin-top:16px;font-size:.86rem;color:var(--gd);line-height:1.6}\n\
    @media(max-width:860px){.contact-top{grid-template-columns:1fr}}\n\n/* STAFF TABLE\
    \ */\ntable{width:100%;border-collapse:collapse;font-size:.88rem;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0\
    \ 2px 16px rgba(0,0,0,.07);margin-bottom:48px}\nth{background:var(--gd);color:#fff;padding:14px\
    \ 20px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}\n\
    td{padding:14px 20px;border-bottom:1px solid #e4ede6;color:var(--text);vertical-align:middle}\n\
    tr:last-child td{border-bottom:none}\ntr:hover td{background:#f3f8f4}\ntd a{color:var(--gm);text-decoration:none;font-weight:500}.td\
    \ a:hover{text-decoration:underline}\n.role-badge{display:inline-block;padding:3px\
    \ 10px;border-radius:100px;font-size:.73rem;font-weight:600;background:var(--gp);color:var(--gm)}\n\
    \n/* BOARD PHOTOS */\n.board-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;margin-top:36px}\n\
    .board-card{background:#fff;border-radius:var(--r);overflow:hidden;border:1.5px\
    \ solid #dde8de;transition:all .2s;text-align:center}\n.board-card:hover{border-color:var(--gl);transform:translateY(-3px);box-shadow:var(--shadow)}\n\
    .board-card img{width:100%;height:200px;object-fit:cover;object-position:top;display:block}\n\
    .board-info{padding:14px 12px}\n.board-info h4{font-size:.9rem;font-weight:700;color:var(--gd);margin-bottom:4px}\n\
    .board-info p{font-size:.78rem;color:var(--muted)}\n\n/* INFO BAND */\n.info-band{background:#0e2219;padding:60px\
    \ 40px}\n.info-grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:36px}\n\
    .info-panel h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gl2);margin-bottom:14px}\n\
    .info-panel p,.info-panel li{color:rgba(255,255,255,.62);font-size:.87rem;line-height:1.75}\n\
    .info-panel ul{list-style:none}\n.info-panel li{padding:2px 0}\n.info-panel li::before{content:'→\
    \ ';color:var(--gl)}\n.info-panel a{color:var(--gl2);text-decoration:none}.info-panel\
    \ a:hover{text-decoration:underline}\n</style>\n</head>\n<body>\n\n<nav>\n  <a\
    \ href=\"/\" class=\"nav-brand\">\n    <img src=\"https://legacypark.org/wp-content/uploads/2024/01/cropped-cropped-LegacyParkBelltower_FINAL_3colors-scaled-1.jpg\"\
    \ alt=\"Legacy Park\" class=\"nav-logo\">\n    <div><div class=\"nav-name\">Legacy\
    \ Park</div><div class=\"nav-sub\">Kennesaw, Georgia</div></div>\n  </a>\n  <ul\
    \ class=\"nav-links\">\n    <li><a href=\"/\">Home</a></li>\n    <li><a href=\"\
    /sports.html\">Sports</a></li>\n    <li><a href=\"/residents.html\">Residents</a></li>\n\
    \    <li><a href=\"/contact.html\" class=\"active\">Contact</a></li>\n    <li><a\
    \ href=\"https://legacypark.org/newsletters\" target=\"_blank\">Newsletter</a></li>\n\
    \    <li><a href=\"https://legacypark.org/event-calendar\" target=\"_blank\">Calendar</a></li>\n\
    \    <li><a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"portal\">Owner Portal</a></li>\n  </ul>\n</nav>\n\n\
    <div class=\"page-hero\">\n  <div class=\"page-hero-bg\"></div>\n  <div class=\"\
    page-hero-inner\">\n    <div class=\"breadcrumb\"><a href=\"/\">Home</a><span>/</span><span\
    \ style=\"color:#fff\">Contact &amp; Staff</span></div>\n    <h1>Contact Us</h1>\n\
    \    <p>HOA office, staff directory, board contacts, and everything you need to\
    \ reach the right person at Legacy Park.</p>\n  </div>\n</div>\n\n<!-- CONTACT\
    \ + HOURS -->\n<section style=\"background:#fff\">\n  <div class=\"container\"\
    >\n    <div class=\"contact-top\">\n      <div class=\"contact-card\">\n     \
    \   <h3>\U0001F4CD HOA Office</h3>\n        <div class=\"ci\"><div class=\"ci-icon\"\
    >\U0001F4CD</div><div><div class=\"ci-label\">Address</div><div class=\"ci-val\"\
    >4201 Legacy Park Circle<br>Kennesaw, GA 30144<br><em style=\"font-size:.82rem;color:var(--muted)\"\
    >(Lower level of the Clubhouse)</em></div></div></div>\n        <div class=\"\
    ci\"><div class=\"ci-icon\">\U0001F4DE</div><div><div class=\"ci-label\">Phone</div><div\
    \ class=\"ci-val\"><a href=\"tel:7709192556\">(770) 919-2556</a></div></div></div>\n\
    \        <div class=\"ci\"><div class=\"ci-icon\">\U0001F4E0</div><div><div class=\"\
    ci-label\">Fax</div><div class=\"ci-val\">(770) 919-0066</div></div></div>\n \
    \       <div class=\"ci\"><div class=\"ci-icon\">✉️</div><div><div class=\"ci-label\"\
    >General Email</div><div class=\"ci-val\"><a href=\"mailto:HOAoffice@LegacyPark.org\"\
    >HOAoffice@LegacyPark.org</a></div></div></div>\n        <div class=\"ci\"><div\
    \ class=\"ci-icon\">\U0001F4CB</div><div><div class=\"ci-label\">Board of Directors</div><div\
    \ class=\"ci-val\"><a href=\"mailto:boardmembers@legacypark.org\">boardmembers@legacypark.org</a></div></div></div>\n\
    \        <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:16px\">\n\
    \          <a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"btn btn-gold\">Owner Portal →</a>\n          <a href=\"\
    mailto:HOAoffice@LegacyPark.org\" class=\"btn btn-outline\">Email Office →</a>\n\
    \        </div>\n      </div>\n      <div class=\"contact-card\">\n        <h3>\U0001F550\
    \ Office Hours</h3>\n        <div class=\"hour-grid\">\n          <div class=\"\
    hour-item\"><div class=\"day\">Monday – Friday</div><div class=\"time\">10:00\
    \ AM – 2:00 PM</div></div>\n          <div class=\"hour-item\"><div class=\"day\"\
    >1st Saturday</div><div class=\"time\">9:00 AM – 11:00 AM</div></div>\n      \
    \  </div>\n        <p style=\"font-size:.87rem;color:var(--muted);margin-top:18px;line-height:1.65\"\
    >Appointments available outside regular hours. Call <a href=\"tel:7709192556\"\
    \ style=\"color:var(--gm)\">(770) 919-2556</a> or email <a href=\"mailto:HOAoffice@LegacyPark.org\"\
    \ style=\"color:var(--gm)\">HOAoffice@LegacyPark.org</a> to schedule.</p>\n  \
    \      <div class=\"board-note\">\n          <strong>\U0001F4C5 Board Meetings</strong><br>\n\
    \          <strong>2nd Tuesday:</strong> Planning Meeting — 6:30 PM<br>\n    \
    \      <strong>4th Tuesday:</strong> Board Meeting — 6:30 PM<br>\n          <em>Location:\
    \ Legacy Park Clubhouse. All residents welcome.</em>\n        </div>\n      </div>\n\
    \    </div>\n  </div>\n</section>\n\n<!-- STAFF -->\n<section style=\"background:var(--bg)\"\
    >\n  <div class=\"container\">\n    <div class=\"s-eyebrow\">HOA Staff</div>\n\
    \    <h2>Staff Directory</h2>\n    <p class=\"s-sub\">Reach the right person directly.\
    \ Our team is here to help with all community needs.</p>\n    <table>\n      <thead><tr><th>Role</th><th>Name</th><th>Email</th></tr></thead>\n\
    \      <tbody>\n        <tr><td><span class=\"role-badge\">Property Manager</span></td><td><strong>Candace\
    \ Cole</strong></td><td><a href=\"mailto:propertymanager@legacypark.org\">propertymanager@legacypark.org</a></td></tr>\n\
    \        <tr><td><span class=\"role-badge\">Asst. Property Manager</span></td><td><strong>Alexandra\
    \ Smith</strong></td><td><a href=\"mailto:assistantmanager@legacypark.org\">assistantmanager@legacypark.org</a></td></tr>\n\
    \        <tr><td><span class=\"role-badge\">Covenant Enforcement</span></td><td><strong>Joanne\
    \ Yaeger-Hart</strong></td><td><a href=\"mailto:joannew@legacypark.org\">joannew@legacypark.org</a></td></tr>\n\
    \        <tr><td><span class=\"role-badge\">Activities &amp; Sports</span></td><td><strong>Michelle\
    \ Melton</strong></td><td><a href=\"mailto:activitiesdirector@legacypark.org\"\
    >activitiesdirector@legacypark.org</a></td></tr>\n        <tr><td><span class=\"\
    role-badge\">Office Assistant</span></td><td><strong>Danielle Denton</strong></td><td><a\
    \ href=\"mailto:officeassistant@legacypark.org\">officeassistant@legacypark.org</a></td></tr>\n\
    \      </tbody>\n    </table>\n\n    <div class=\"s-eyebrow\">Board of Directors</div>\n\
    \    <h2>Meet the Board</h2>\n    <p class=\"s-sub\">Meetings held the 2nd &amp;\
    \ 4th Tuesday of each month at 6:30 PM at the Legacy Park Clubhouse.</p>\n   \
    \ <div class=\"board-grid\">\n      <div class=\"board-card\">\n        <img src=\"\
    https://legacypark.org/wp-content/uploads/2025/11/StacyLynnRichardson-scaled.jpg\"\
    \ alt=\"Stacy Richardson\">\n        <div class=\"board-info\"><h4>Stacy Richardson</h4><p>Board\
    \ Member</p></div>\n      </div>\n      <div class=\"board-card\">\n        <img\
    \ src=\"https://legacypark.org/wp-content/uploads/2025/11/Tyler-Vaniman-Photo-scaled.jpg\"\
    \ alt=\"Tyler Vaniman\">\n        <div class=\"board-info\"><h4>Tyler Vaniman</h4><p>Board\
    \ Member</p></div>\n      </div>\n      <div class=\"board-card\">\n        <img\
    \ src=\"https://legacypark.org/wp-content/uploads/2024/02/Doug-Tuchmann-Picture.jpg\"\
    \ alt=\"Doug Tuchmann\">\n        <div class=\"board-info\"><h4>Doug Tuchmann</h4><p>Board\
    \ Member</p></div>\n      </div>\n      <div class=\"board-card\">\n        <img\
    \ src=\"https://legacypark.org/wp-content/uploads/2024/02/Keith-Simington.jpg\"\
    \ alt=\"Keith Simington\">\n        <div class=\"board-info\"><h4>Keith Simington</h4><p>Board\
    \ Member</p></div>\n      </div>\n      <div class=\"board-card\">\n        <img\
    \ src=\"https://legacypark.org/wp-content/uploads/2021/02/Michaela-Hicks-Picture.jpeg\"\
    \ alt=\"Michaela Hicks\">\n        <div class=\"board-info\"><h4>Michaela Hicks</h4><p>Board\
    \ Member</p></div>\n      </div>\n    </div>\n    <p style=\"font-size:.86rem;color:var(--muted);margin-top:18px\"\
    >Questions for the board? Email <a href=\"mailto:boardmembers@legacypark.org\"\
    \ style=\"color:var(--gm)\">boardmembers@legacypark.org</a></p>\n  </div>\n</section>\n\
    \n<!-- COMMITTEES -->\n<section style=\"background:#fff\">\n  <div class=\"container\"\
    >\n    <div class=\"s-eyebrow\">Volunteer Committees</div>\n    <h2>Committee\
    \ Contacts</h2>\n    <p class=\"s-sub\">Each committee has openings for new members.\
    \ Get involved and make a difference.</p>\n    <table>\n      <thead><tr><th>Committee</th><th>Contact</th><th>Email</th></tr></thead>\n\
    \      <tbody>\n        <tr><td>Election Committee</td><td>Deacon Robert Henry</td><td><a\
    \ href=\"mailto:elections@legacypark.org\">elections@legacypark.org</a></td></tr>\n\
    \        <tr><td>Finance Committee</td><td>Annette Hunter</td><td><a href=\"mailto:ahunter.hats@gmail.com\"\
    >ahunter.hats@gmail.com</a></td></tr>\n        <tr><td>Activities Committee</td><td>Michelle\
    \ Melton</td><td><a href=\"mailto:activitiesdirector@legacypark.org\">activitiesdirector@legacypark.org</a></td></tr>\n\
    \        <tr><td>Pickleball Committee</td><td>Betsy Raglin</td><td><a href=\"\
    mailto:pickleball@legacypark.org\">pickleball@legacypark.org</a></td></tr>\n \
    \       <tr><td>Tennis Committee</td><td>Stacey Tuchmann</td><td><a href=\"mailto:tennis@legacypark.org\"\
    >tennis@legacypark.org</a></td></tr>\n        <tr><td>Cub Scout Pack 002</td><td>Cubmaster</td><td><a\
    \ href=\"mailto:cubmaster@pack002.com\">cubmaster@pack002.com</a></td></tr>\n\
    \        <tr><td>Boy Scout Troop 002</td><td>Scoutmaster</td><td><a href=\"mailto:scoutmaster@troop002.org\"\
    >scoutmaster@troop002.org</a></td></tr>\n      </tbody>\n    </table>\n    <a\
    \ href=\"/residents.html\" class=\"btn btn-green\">New Resident Info →</a>\n \
    \ </div>\n</section>\n\n<!-- MAP -->\n<section style=\"background:var(--gd);padding:72px\
    \ 40px\">\n  <div class=\"container\">\n    <div style=\"display:grid;grid-template-columns:1fr\
    \ 1fr;gap:48px;align-items:center\">\n      <div>\n        <div class=\"s-eyebrow\"\
    \ style=\"color:var(--gl)\">Find Us</div>\n        <h2 style=\"color:#fff;margin-bottom:14px\"\
    >We're Here to Help</h2>\n        <p style=\"color:rgba(255,255,255,.7);font-size:.93rem;line-height:1.75;margin-bottom:24px\"\
    >The HOA office is in the lower level of the Legacy Park Clubhouse — the main\
    \ community hub for all resident services.</p>\n        <div style=\"color:rgba(255,255,255,.7);font-size:.88rem;line-height:1.9;margin-bottom:24px\"\
    >\n          \U0001F4CD 4201 Legacy Park Circle, Kennesaw, GA 30144<br>\n    \
    \      \U0001F4DE <a href=\"tel:7709192556\" style=\"color:var(--gl2)\">(770)\
    \ 919-2556</a><br>\n          ✉️ <a href=\"mailto:HOAoffice@LegacyPark.org\" style=\"\
    color:var(--gl2)\">HOAoffice@LegacyPark.org</a>\n        </div>\n        <a href=\"\
    https://maps.google.com/maps/search/Legacy+Park+HOA+4201+Legacy+Park+Circle+Kennesaw+GA\"\
    \ target=\"_blank\" class=\"btn btn-gold\">Open in Google Maps →</a>\n      </div>\n\
    \      <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:40px;text-align:center\"\
    >\n        <div style=\"font-size:3.5rem;margin-bottom:14px\">\U0001F4CD</div>\n\
    \        <div style=\"color:#fff;font-weight:700;font-size:1rem;margin-bottom:6px\"\
    >4201 Legacy Park Circle</div>\n        <div style=\"color:rgba(255,255,255,.6);font-size:.88rem;margin-bottom:20px\"\
    >Kennesaw, Georgia 30144</div>\n        <a href=\"https://maps.google.com/maps/search/Legacy+Park+HOA+4201+Legacy+Park+Circle+Kennesaw+GA\"\
    \ target=\"_blank\" style=\"color:var(--gl2);font-size:.86rem;text-decoration:none\"\
    >Directions →</a>\n      </div>\n    </div>\n  </div>\n</section>\n\n<div class=\"\
    info-band\">\n  <div class=\"info-grid\">\n    <div class=\"info-panel\"><h3>\U0001F511\
    \ Owner Portal</h3><p>Pay assessments, submit requests, access minutes.<br><br><a\
    \ href=\"https://legacypark.managebuilding.com/Resident/portal/login\">Login →</a></p></div>\n\
    \    <div class=\"info-panel\"><h3>\U0001F4DA Knowledge Base</h3><p>Governing\
    \ docs, policies, modification forms — fully searchable.<br><br><a href=\"https://legacypark.org/knowledge-base\"\
    >Browse →</a></p></div>\n    <div class=\"info-panel\"><h3>\U0001F4C5 Events</h3><p>Full-time\
    \ Activities Director manages events year-round. Most are free.<br><br><a href=\"\
    https://legacypark.org/event-calendar\">View Calendar →</a></p></div>\n    <div\
    \ class=\"info-panel\"><h3>⚽ Sports</h3><p>Soccer, Tennis, Pickleball, T-Ball,\
    \ Volleyball for all ages.<br><br><a href=\"/sports.html\">Sports Programs →</a></p></div>\n\
