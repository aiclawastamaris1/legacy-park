    .pf-list li::before{content:'✓';position:absolute;left:0;color:var(--gl);font-weight:700}\n\
    @media(max-width:860px){.split{grid-template-columns:1fr}.split-img{min-height:220px}}\n\
    \n/* RESOURCES */\n.res-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}\n\
    .res-card{background:#fff;border-radius:var(--r);padding:24px 22px;border:1.5px\
    \ solid #dde8de;text-decoration:none;color:var(--text);transition:all .22s;display:flex;flex-direction:column;gap:8px}\n\
    .res-card:hover{border-color:var(--gl);transform:translateY(-3px);box-shadow:var(--shadow)}\n\
    .res-icon{font-size:1.7rem}\n.res-card h3{font-size:.96rem;font-weight:700;color:var(--gd)}\n\
    .res-card p{font-size:.84rem;color:var(--muted);line-height:1.55;flex-grow:1}\n\
    .res-link{color:var(--gm);font-weight:600;font-size:.82rem}\n\n/* COMMITTEES TABLE\
    \ */\ntable{width:100%;border-collapse:collapse;font-size:.88rem;background:#fff;border-radius:var(--r);overflow:hidden;box-shadow:0\
    \ 2px 16px rgba(0,0,0,.07)}\nth{background:var(--gd);color:#fff;padding:14px 20px;text-align:left;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}\n\
    td{padding:14px 20px;border-bottom:1px solid #e4ede6;color:var(--text);vertical-align:middle}\n\
    tr:last-child td{border-bottom:none}\ntr:hover td{background:#f3f8f4}\ntd a{color:var(--gm);text-decoration:none;font-weight:500}.td\
    \ a:hover{text-decoration:underline}\n\n/* INFO BAND */\n.info-band{background:#0e2219;padding:60px\
    \ 40px}\n.info-grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:36px}\n\
    .info-panel h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--gl2);margin-bottom:14px}\n\
    .info-panel p,.info-panel li{color:rgba(255,255,255,.62);font-size:.87rem;line-height:1.75}\n\
    .info-panel ul{list-style:none}\n.info-panel li{padding:2px 0}\n.info-panel li::before{content:'→\
    \ ';color:var(--gl)}\n.info-panel a{color:var(--gl2);text-decoration:none}.info-panel\
    \ a:hover{text-decoration:underline}\n</style>\n</head>\n<body>\n\n<nav>\n  <a\
