    \        </div>\n      </div>\n    </div>\n\n    <!-- TENNIS -->\n    <div class=\"\
    sport-card\" id=\"tennis\">\n      <div class=\"sport-header\" style=\"background:#1c4d38\"\
    >\n        <div class=\"sport-icon\">\U0001F3BE</div>\n        <div>\n       \
    \   <div class=\"sport-title\">Tennis</div>\n          <div class=\"sport-sub\"\
    >11 courts · Director Clifford Malivert · Lessons available</div>\n        </div>\n\
    \      </div>\n      <div class=\"sport-body\">\n        <p>Legacy Park's 11 tennis\
    \ courts are for the <strong>exclusive use of residents and their guests</strong>.\
    \ A resident must be on the court with any non-resident guests and be within the\
    \ guest ratio. Members must carry their amenity ID card at all times.</p>\n  \
    \      <p>Meet your Tennis Director, <strong>Clifford Malivert</strong> — 30+\
