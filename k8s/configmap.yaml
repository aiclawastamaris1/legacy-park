    \ packet. Hours: Mon–Fri 10am–2pm, 1st Saturday 9–11am.</p>\n        </div>\n\
    \      </div>\n      <div class=\"step\">\n        <div class=\"step-num\">3</div>\n\
    \        <div class=\"step-body\">\n          <h3>Register in the Owner Portal</h3>\n\
    \          <p>The Owner Portal is our primary means of staying connected. Register\
    \ with your primary email address — accounts are limited to one email. Don't have\
