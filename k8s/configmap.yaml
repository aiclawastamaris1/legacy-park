  index.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\"\
    >\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n  <title>Legacy Park — Design Preview</title>\n  <link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap\"\
    \ rel=\"stylesheet\">\n  <style>\n    * { box-sizing: border-box; margin: 0; padding:\
    \ 0; }\n    body { font-family: 'Inter', sans-serif; background: #0b1120; color:\
    \ #f0f4f8; min-height: 100vh; }\n    .header { padding: 60px 40px 40px; text-align:\
    \ center; border-bottom: 1px solid rgba(255,255,255,.08); }\n    .header h1 {\
    \ font-size: 2rem; font-weight: 700; color: white; margin-bottom: 8px; }\n   \
    \ .header p  { color: #8b99b0; font-size: 1rem; }\n    .grid { display: grid;\
    \ grid-template-columns: 1fr 1fr; gap: 32px; max-width: 1000px; margin: 60px auto;\
    \ padding: 0 40px; }\n    .card { background: #111827; border: 1px solid rgba(255,255,255,.08);\
    \ border-radius: 16px; overflow: hidden; transition: transform .25s, border-color\
    \ .25s; }\n    .card:hover { transform: translateY(-4px); border-color: rgba(14,165,233,.3);\
    \ }\n    .card-preview { height: 200px; display: flex; align-items: center; justify-content:\
    \ center; font-size: 4rem; }\n    .v1-preview { background: linear-gradient(135deg,\
    \ #1a3d2b, #2d6a4f); }\n    .v2-preview { background: linear-gradient(135deg,\
    \ #0b1120, #0d2035); }\n    .card-body { padding: 24px; }\n    .card-tag { font-size:\
    \ .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom:\
    \ 8px; color: #0ea5e9; }\n    .card-body h2 { font-size: 1.2rem; font-weight:\
    \ 700; color: white; margin-bottom: 8px; }\n    .card-body p  { font-size: .88rem;\
    \ color: #8b99b0; line-height: 1.6; margin-bottom: 20px; }\n    .card-badges {\
    \ display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }\n    .badge\
    \ { background: rgba(14,165,233,.1); color: #0ea5e9; padding: 4px 10px; border-radius:\
    \ 100px; font-size: .75rem; font-weight: 600; }\n    .badge.green { background:\
    \ rgba(16,185,129,.1); color: #10b981; }\n    .badge.amber { background: rgba(245,158,11,.1);\
    \ color: #f59e0b; }\n    .btn { display: inline-block; padding: 10px 22px; border-radius:\
    \ 10px; font-weight: 600; font-size: .9rem; text-decoration: none; transition:\
    \ .2s; }\n    .btn-teal  { background: #0ea5e9; color: white; }\n    .btn-teal:hover\
    \ { background: #0284c7; }\n    .btn-ghost { background: rgba(255,255,255,.06);\
    \ color: #f0f4f8; margin-left: 10px; border: 1px solid rgba(255,255,255,.1); }\n\
    \    .btn-ghost:hover { background: rgba(255,255,255,.12); }\n    @media (max-width:\
    \ 640px) { .grid { grid-template-columns: 1fr; padding: 0 20px; } }\n  </style>\n\
    </head>\n<body>\n  <div class=\"header\">\n    <h1>\U0001F333 Legacy Park — Design\
    \ Preview</h1>\n    <p>Two modern redesigns of legacypark.org — choose your favourite</p>\n\
    \  </div>\n  <div class=\"grid\">\n    <div class=\"card\">\n      <div class=\"\
    card-preview v1-preview\">\U0001F33F</div>\n      <div class=\"card-body\">\n\
    \        <div class=\"card-tag\">Version 1</div>\n        <h2>Community Spirit</h2>\n\
    \        <p>Warm greens and earth tones. Nature-inspired, inviting, classic community\
    \ feel. Great for families and a welcoming HOA presence.</p>\n        <div class=\"\
    card-badges\">\n          <span class=\"badge green\">Nature-Inspired</span>\n\
    \          <span class=\"badge green\">Warm & Inviting</span>\n          <span\
    \ class=\"badge\">Light Mode</span>\n        </div>\n        <a href=\"/v1.html\"\
    \ class=\"btn btn-teal\">View Version 1</a>\n      </div>\n    </div>\n    <div\
    \ class=\"card\">\n      <div class=\"card-preview v2-preview\">\U0001F680</div>\n\
    \      <div class=\"card-body\">\n        <div class=\"card-tag\">Version 2</div>\n\
    \        <h2>Modern Hub</h2>\n        <p>Bold dark navy with teal &amp; mint accents.\
    \ Contemporary, sharp, dashboard-style. Makes the community feel forward-thinking\
    \ and dynamic.</p>\n        <div class=\"card-badges\">\n          <span class=\"\
    badge\">Dark Mode</span>\n          <span class=\"badge\">Bold &amp; Modern</span>\n\
    \          <span class=\"badge amber\">Tech Forward</span>\n        </div>\n \
    \       <a href=\"/v2.html\" class=\"btn btn-teal\">View Version 2</a>\n     \
    \ </div>\n    </div>\n  </div>\n</body>\n</html>\n"
  v1.html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\"\
    >\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"\
    >\n  <title>Legacy Park — Kennesaw, GA</title>\n  <link rel=\"preconnect\" href=\"\
    https://fonts.googleapis.com\">\n  <link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap\"\
    \ rel=\"stylesheet\">\n  <style>\n    *, *::before, *::after { box-sizing: border-box;\
    \ margin: 0; padding: 0; }\n\n    :root {\n      --green-dark:  #1a3d2b;\n   \
    \   --green-mid:   #2d6a4f;\n      --green-light: #52b788;\n      --green-pale:\
    \  #d8f3dc;\n      --gold:        #c9a84c;\n      --gold-light:  #f0d080;\n  \
    \    --cream:       #fdf8f0;\n      --text:        #1c2b20;\n      --muted:  \
    \     #5a7065;\n      --white:       #ffffff;\n      --card-shadow: 0 4px 24px\
    \ rgba(0,0,0,.08);\n      --radius:      16px;\n    }\n\n    html { scroll-behavior:\
    \ smooth; }\n\n    body {\n      font-family: 'Inter', sans-serif;\n      background:\
    \ var(--cream);\n      color: var(--text);\n      line-height: 1.6;\n    }\n\n\
    \    /* ── NAV ─────────────────────────────────────────── */\n    nav {\n   \
    \   position: fixed; top: 0; left: 0; right: 0;\n      z-index: 100;\n      display:\
    \ flex; align-items: center; justify-content: space-between;\n      padding: 0\
    \ 40px;\n      height: 70px;\n      background: rgba(26,61,43,.95);\n      backdrop-filter:\
    \ blur(12px);\n      border-bottom: 1px solid rgba(255,255,255,.08);\n    }\n\
    \    .nav-brand {\n      display: flex; align-items: center; gap: 12px;\n    \
    \  text-decoration: none;\n    }\n    .nav-logo {\n      width: 38px; height:\
    \ 38px;\n      background: linear-gradient(135deg, var(--green-light), var(--gold));\n\
    \      border-radius: 10px;\n      display: flex; align-items: center; justify-content:\
    \ center;\n      font-size: 20px;\n    }\n    .nav-brand-text { color: white;\
    \ font-weight: 700; font-size: 1.05rem; line-height: 1.2; }\n    .nav-brand-sub\
    \  { color: rgba(255,255,255,.5); font-size: .75rem; font-weight: 400; }\n   \
    \ .nav-links { display: flex; align-items: center; gap: 6px; list-style: none;\
    \ }\n    .nav-links a {\n      color: rgba(255,255,255,.8); text-decoration: none;\n\
    \      padding: 7px 14px; border-radius: 8px; font-size: .9rem;\n      transition:\
    \ all .2s;\n    }\n    .nav-links a:hover { background: rgba(255,255,255,.1);\
    \ color: white; }\n    .nav-cta {\n      background: var(--gold) !important; color:\
    \ var(--green-dark) !important;\n      font-weight: 600; padding: 8px 18px !important;\n\
    \    }\n    .nav-cta:hover { background: var(--gold-light) !important; }\n   \
    \ .nav-toggle { display: none; background: none; border: none; cursor: pointer;\
    \ }\n    .nav-toggle span { display: block; width: 24px; height: 2px; background:\
    \ white; margin: 5px 0; border-radius: 2px; transition: .3s; }\n\n    /* ── HERO\
    \ ────────────────────────────────────────── */\n    .hero {\n      min-height:\
    \ 100vh;\n      background:\n        linear-gradient(to bottom, rgba(20,50,32,.72)\
    \ 0%, rgba(20,50,32,.4) 60%, rgba(253,248,240,1) 100%),\n        url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1600&q=80')\
    \ center/cover no-repeat;\n      display: flex; align-items: center;\n      padding:\
    \ 120px 40px 80px;\n    }\n    .hero-inner { max-width: 720px; }\n    .hero-badge\
    \ {\n      display: inline-flex; align-items: center; gap: 8px;\n      background:\
    \ rgba(255,255,255,.15); backdrop-filter: blur(8px);\n      border: 1px solid\
    \ rgba(255,255,255,.25);\n      color: white; padding: 6px 14px; border-radius:\
    \ 100px;\n      font-size: .8rem; font-weight: 500; letter-spacing: .5px;\n  \
    \    text-transform: uppercase; margin-bottom: 24px;\n    }\n    .hero-badge::before\
    \ { content: '\U0001F33F'; }\n    h1 {\n      font-family: 'Playfair Display',\
    \ serif;\n      font-size: clamp(2.6rem, 6vw, 4.5rem);\n      font-weight: 900;\
    \ color: white; line-height: 1.1;\n      margin-bottom: 20px;\n      text-shadow:\
    \ 0 2px 20px rgba(0,0,0,.3);\n    }\n    h1 em { color: var(--gold-light); font-style:\
    \ normal; }\n    .hero-sub {\n      font-size: 1.15rem; color: rgba(255,255,255,.85);\n\
    \      max-width: 540px; margin-bottom: 36px; font-weight: 300;\n    }\n    .hero-actions\
    \ { display: flex; flex-wrap: wrap; gap: 14px; }\n    .btn {\n      display: inline-flex;\
    \ align-items: center; gap: 8px;\n      padding: 13px 26px; border-radius: 12px;\n\
    \      font-weight: 600; font-size: .95rem;\n      text-decoration: none; border:\
    \ none; cursor: pointer;\n      transition: all .2s; white-space: nowrap;\n  \
    \  }\n    .btn-primary   { background: var(--gold); color: var(--green-dark);\
    \ }\n    .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px);\
    \ box-shadow: 0 8px 24px rgba(201,168,76,.4); }\n    .btn-outline   { background:\
    \ rgba(255,255,255,.12); color: white; border: 1.5px solid rgba(255,255,255,.4);\
    \ backdrop-filter: blur(8px); }\n    .btn-outline:hover { background: rgba(255,255,255,.22);\
    \ transform: translateY(-2px); }\n    .btn-green     { background: var(--green-mid);\
    \ color: white; }\n    .btn-green:hover { background: var(--green-dark); transform:\
    \ translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,.35); }\n\n    .hero-stats\
    \ {\n      display: flex; flex-wrap: wrap; gap: 28px;\n      margin-top: 56px;\
    \ padding-top: 40px;\n      border-top: 1px solid rgba(255,255,255,.15);\n   \
    \ }\n    .stat { color: white; }\n    .stat-num { font-family: 'Playfair Display',\
    \ serif; font-size: 2.2rem; font-weight: 700; line-height: 1; color: var(--gold-light);\
    \ }\n    .stat-label { font-size: .8rem; color: rgba(255,255,255,.6); font-weight:\
    \ 500; text-transform: uppercase; letter-spacing: .5px; margin-top: 4px; }\n\n\
    \    /* ── SECTIONS ────────────────────────────────────── */\n    section { padding:\
    \ 80px 40px; }\n    .container { max-width: 1200px; margin: 0 auto; }\n    .section-label\
    \ {\n      display: inline-flex; align-items: center; gap: 8px;\n      color:\
    \ var(--green-mid); font-weight: 600; font-size: .8rem;\n      text-transform:\
    \ uppercase; letter-spacing: 1px; margin-bottom: 12px;\n    }\n    .section-label::before\
    \ { content: ''; width: 24px; height: 2px; background: var(--green-light); border-radius:\
    \ 2px; }\n    h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.8rem,\
    \ 3.5vw, 2.6rem); font-weight: 700; color: var(--green-dark); line-height: 1.2;\
    \ margin-bottom: 16px; }\n    .section-intro { color: var(--muted); font-size:\
    \ 1.05rem; max-width: 600px; margin-bottom: 48px; }\n\n    /* ── QUICK LINKS ──────────────────────────────────\
    \ */\n    .quick-links { background: white; }\n    .ql-grid { display: grid; grid-template-columns:\
    \ repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }\n    .ql-card {\n      background:\
    \ var(--cream); border-radius: var(--radius);\n      padding: 28px 24px; text-decoration:\
    \ none; color: var(--text);\n      border: 1.5px solid transparent;\n      transition:\
    \ all .25s; display: flex; flex-direction: column; gap: 12px;\n    }\n    .ql-card:hover\
    \ { border-color: var(--green-light); transform: translateY(-3px); box-shadow:\
    \ var(--card-shadow); }\n    .ql-icon { font-size: 2rem; }\n    .ql-card h3 {\
    \ font-size: 1.05rem; font-weight: 600; color: var(--green-dark); }\n    .ql-card\
    \ p  { font-size: .87rem; color: var(--muted); line-height: 1.5; }\n    .ql-arrow\
    \ { margin-top: auto; color: var(--green-mid); font-weight: 600; font-size: .85rem;\
    \ }\n\n    /* ── AMENITIES ──────────────────────────────────── */\n    .amenities\
    \ { background: var(--green-pale); }\n    .am-grid { display: grid; grid-template-columns:\
    \ repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }\n    .am-item {\n      background:\
    \ white; border-radius: 14px; padding: 22px 18px;\n      display: flex; align-items:\
    \ center; gap: 14px;\n      box-shadow: 0 2px 12px rgba(0,0,0,.05);\n      transition:\
    \ transform .2s;\n    }\n    .am-item:hover { transform: translateY(-2px); }\n\
    \    .am-icon { font-size: 1.6rem; flex-shrink: 0; }\n    .am-item span { font-size:\
    \ .9rem; font-weight: 500; color: var(--green-dark); line-height: 1.3; }\n\n \
    \   /* ── NEWS / EVENTS ──────────────────────────────── */\n    .events { background:\
    \ white; }\n    .ev-grid { display: grid; grid-template-columns: repeat(auto-fill,\
    \ minmax(300px, 1fr)); gap: 24px; }\n    .ev-card {\n      border-radius: var(--radius);\
    \ overflow: hidden;\n      border: 1.5px solid #e8f0e8;\n      transition: all\
    \ .25s;\n    }\n    .ev-card:hover { transform: translateY(-4px); box-shadow:\
    \ var(--card-shadow); border-color: var(--green-light); }\n    .ev-header {\n\
    \      background: var(--green-dark); padding: 24px;\n      display: flex; align-items:\
    \ center; gap: 16px;\n    }\n    .ev-date {\n      background: var(--gold); color:\
    \ var(--green-dark);\n      border-radius: 10px; padding: 8px 14px; text-align:\
    \ center; flex-shrink: 0;\n    }\n    .ev-date .day { font-family: 'Playfair Display',\
    \ serif; font-size: 1.6rem; font-weight: 700; line-height: 1; }\n    .ev-date\
    \ .mo  { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing:\
    \ 1px; }\n    .ev-title { color: white; font-weight: 600; font-size: 1rem; }\n\
    \    .ev-time  { color: rgba(255,255,255,.6); font-size: .82rem; margin-top: 4px;\
    \ }\n    .ev-body  { padding: 20px 24px; }\n    .ev-body p { font-size: .9rem;\
    \ color: var(--muted); line-height: 1.6; }\n    .ev-tag {\n      display: inline-block;\
    \ margin-top: 14px;\n      background: var(--green-pale); color: var(--green-mid);\n\
    \      padding: 4px 12px; border-radius: 100px; font-size: .78rem; font-weight:\
    \ 600;\n    }\n\n    /* ── INFO PANELS ─────────────────────────────────── */\n\
    \    .info-band {\n      background: var(--green-dark);\n      padding: 64px 40px;\n\
    \    }\n    .info-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns:\
    \ repeat(auto-fill, minmax(260px, 1fr)); gap: 32px; }\n    .info-panel { color:\
    \ white; }\n    .info-panel h3 { font-family: 'Playfair Display', serif; font-size:\
    \ 1.25rem; color: var(--gold-light); margin-bottom: 14px; }\n    .info-panel p,\
    \ .info-panel li { font-size: .9rem; color: rgba(255,255,255,.75); line-height:\
    \ 1.7; }\n    .info-panel ul { list-style: none; padding: 0; }\n    .info-panel\
    \ li::before { content: '→ '; color: var(--green-light); font-weight: 600; }\n\
    \    .info-panel a { color: var(--gold-light); text-decoration: none; }\n    .info-panel\
    \ a:hover { text-decoration: underline; }\n\n    /* ── BOARD MEETINGS ──────────────────────────────\
    \ */\n    .meetings { background: var(--cream); }\n    .meet-cards { display:\
    \ grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;\
    \ }\n    .meet-card {\n      background: white; border-radius: var(--radius);\
    \ padding: 28px;\n      border-left: 4px solid var(--green-light);\n      box-shadow:\
    \ var(--card-shadow);\n    }\n    .meet-type { font-size: .78rem; font-weight:\
    \ 700; text-transform: uppercase; letter-spacing: 1px; color: var(--green-mid);\
    \ margin-bottom: 10px; }\n    .meet-card h3 { font-size: 1.1rem; font-weight:\
    \ 700; color: var(--green-dark); margin-bottom: 6px; }\n    .meet-card p  { font-size:\
    \ .9rem; color: var(--muted); }\n\n    /* ── CONTACT / CTA ─────────────────────────────────\
    \ */\n    .contact { background: white; }\n    .cta-box {\n      background: linear-gradient(135deg,\
    \ var(--green-dark) 0%, var(--green-mid) 100%);\n      border-radius: 24px; padding:\
    \ 60px 48px;\n      display: flex; flex-wrap: wrap; align-items: center; justify-content:\
    \ space-between; gap: 32px;\n    }\n    .cta-box h2 { color: white; margin-bottom:\
    \ 10px; }\n    .cta-box p  { color: rgba(255,255,255,.75); max-width: 480px; font-size:\
    \ 1rem; }\n    .contact-info { display: flex; flex-direction: column; gap: 10px;\
    \ margin-top: 28px; }\n    .ci { display: flex; align-items: center; gap: 10px;\
    \ color: rgba(255,255,255,.8); font-size: .9rem; }\n    .ci-icon { font-size:\
    \ 1.1rem; }\n\n    /* ── FOOTER ──────────────────────────────────────── */\n\
    \    footer {\n      background: #111d17; color: rgba(255,255,255,.55);\n    \
    \  padding: 32px 40px; text-align: center;\n      font-size: .85rem;\n    }\n\
    \    footer a { color: var(--green-light); text-decoration: none; }\n\n    /*\
    \ ── MOBILE ──────────────────────────────────────── */\n    @media (max-width:\
    \ 768px) {\n      nav { padding: 0 20px; }\n      .nav-links { display: none;\
    \ }\n      .nav-toggle { display: block; }\n      .hero { padding: 100px 20px\
    \ 60px; }\n      section { padding: 60px 20px; }\n      .info-band { padding:\
    \ 48px 20px; }\n      .cta-box { padding: 36px 24px; }\n      footer { padding:\
    \ 24px 20px; }\n    }\n  </style>\n</head>\n<body>\n\n<!-- NAV -->\n<nav>\n  <a\
    \ href=\"#\" class=\"nav-brand\">\n    <div class=\"nav-logo\">\U0001F333</div>\n\
    \    <div>\n      <div class=\"nav-brand-text\">Legacy Park</div>\n      <div\
    \ class=\"nav-brand-sub\">Kennesaw, Georgia</div>\n    </div>\n  </a>\n  <ul class=\"\
    nav-links\">\n    <li><a href=\"#amenities\">Amenities</a></li>\n    <li><a href=\"\
    #events\">Events</a></li>\n    <li><a href=\"#residents\">Residents</a></li>\n\
    \    <li><a href=\"#contact\">Contact</a></li>\n    <li><a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"nav-cta btn\">Resident Portal</a></li>\n  </ul>\n\
    \  <button class=\"nav-toggle\" aria-label=\"Toggle menu\">\n    <span></span><span></span><span></span>\n\
    \  </button>\n</nav>\n\n<!-- HERO -->\n<header class=\"hero\">\n  <div class=\"\
    hero-inner\">\n    <div class=\"hero-badge\">Kennesaw, GA 30144</div>\n    <h1>Where\
    \ <em>Nature</em> Meets<br>Community</h1>\n    <p class=\"hero-sub\">Legacy Park\
    \ is one of Kennesaw's most beloved neighborhoods — 117 acres of parks, trails,\
    \ pools, and community spaces woven together by years of shared memories.</p>\n\
    \    <div class=\"hero-actions\">\n      <a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"btn btn-primary\">\U0001F3E0 Resident Portal</a>\n\
    \      <a href=\"#amenities\" class=\"btn btn-outline\">Explore Amenities</a>\n\
    \      <a href=\"#events\" class=\"btn btn-outline\">\U0001F4C5 Events Calendar</a>\n\
    \    </div>\n    <div class=\"hero-stats\">\n      <div class=\"stat\"><div class=\"\
    stat-num\">117</div><div class=\"stat-label\">Acre Town Park</div></div>\n   \
    \   <div class=\"stat\"><div class=\"stat-num\">4</div><div class=\"stat-label\"\
    >Swimming Pools</div></div>\n      <div class=\"stat\"><div class=\"stat-num\"\
    >11</div><div class=\"stat-label\">Tennis Courts</div></div>\n      <div class=\"\
    stat\"><div class=\"stat-num\">11</div><div class=\"stat-label\">Neighborhood\
    \ Parks</div></div>\n    </div>\n  </div>\n</header>\n\n<!-- QUICK LINKS -->\n\
    <section class=\"quick-links\" id=\"residents\">\n  <div class=\"container\">\n\
    \    <div class=\"section-label\">Get Started</div>\n    <h2>Everything You Need</h2>\n\
    \    <p class=\"section-intro\">New to Legacy Park or just need quick access?\
    \ Find the most important resources right here.</p>\n    <div class=\"ql-grid\"\
    >\n      <a href=\"https://legacypark.managebuilding.com/Resident/portal/login\"\
    \ target=\"_blank\" class=\"ql-card\">\n        <div class=\"ql-icon\">\U0001F511\
    </div>\n        <h3>Resident Portal</h3>\n        <p>Pay assessments, submit requests,\
    \ and manage your account online.</p>\n        <div class=\"ql-arrow\">Access\
    \ Portal →</div>\n      </a>\n      <a href=\"https://legacypark.org/event-calendar\"\
    \ target=\"_blank\" class=\"ql-card\">\n        <div class=\"ql-icon\">\U0001F4C5\
    </div>\n        <h3>Event Calendar</h3>\n        <p>Browse upcoming community\
    \ events managed by our full-time Activities Director.</p>\n        <div class=\"\
    ql-arrow\">View Events →</div>\n      </a>\n      <a href=\"https://legacypark.org/knowledge-base\"\
