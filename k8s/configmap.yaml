    \ Champions</div>\n        </div>\n      </div>\n      <div class=\"sport-body\"\
    >\n        <p>What began as a small neighborhood team in 2019 has rapidly evolved\
    \ into a formidable program making a significant impact on competition across\
    \ the state of Georgia.</p>\n        <p>By Fall 2020, LPSC expanded to two full,\
    \ championship-caliber teams. The program boasts strong performance records including\
    \ multiple <strong>Divisional Championships</strong>, over a <strong>dozen Tournament\
    \ Championships</strong>, and multiple appearances at Tournament finals.</p>\n\
    \        <p style=\"font-style:italic;color:var(--gm);font-weight:500\">\"Above\
