    \    <h1>⚽ Sports &amp; Recreation</h1>\n    <p>From youth leagues to adult pick-up\
    \ games, Legacy Park has one of the most active sports communities in Kennesaw.\
    \ A resident amenity ID is required for all facilities.</p>\n  </div>\n</div>\n\
    \n<section>\n  <div class=\"container\">\n    <p style=\"background:var(--gp);border-left:4px\
    \ solid var(--gl);border-radius:10px;padding:14px 20px;color:var(--gd);font-size:.9rem;margin-bottom:48px\"\
    >\n      <strong>Amenity ID Required:</strong> A Legacy Park Amenity ID card must\
    \ be carried at all times when using community sports facilities. Residents must\
    \ be present with any non-resident guests and stay within guest ratio limits.\n\
    \    </p>\n\n    <!-- ADULT SOCCER -->\n    <div class=\"sport-card\" id=\"soccer\"\
    >\n      <div class=\"sport-header\">\n        <div class=\"sport-icon\">⚽</div>\n\
    \        <div>\n          <div class=\"sport-title\">Adult Soccer</div>\n    \
    \      <div class=\"sport-sub\">Informal pick-up league · 18+ residents</div>\n\
    \        </div>\n        <div style=\"margin-left:auto\"><span class=\"badge-gold\
    \ badge\">Residents 18+</span></div>\n      </div>\n      <div class=\"sport-body\"\
    >\n        <p><strong>Mission:</strong> To Enjoy the Game, While Promoting Positive\
    \ Attitudes and Fitness. This is an informal soccer league that plays pick-up\
    \ games. The annual season begins in September, but players are accepted throughout\
    \ the season.</p>\n        <p><strong>Field Leader Order:</strong> Jeff M, Scott\
    \ T, Pierre J, RJ P, Ken K — if none of these are present, the board will appoint\
    \ the Field Leader.</p>\n        <div class=\"sport-details\">\n          <div\
    \ class=\"sport-detail\"><h4>Contact</h4><p>Scott Thiewes<br><a href=\"mailto:scottthiewes@comcast.net\"\
    >scottthiewes@comcast.net</a></p></div>\n          <div class=\"sport-detail\"\
    ><h4>Season</h4><p>Annual — begins September. Players accepted all season.</p></div>\n\
    \          <div class=\"sport-detail\"><h4>Age Requirement</h4><p>18+ to play.\
    \ Younger players may be allowed per field leader discretion.</p></div>\n    \
    \    </div>\n        <div class=\"sport-actions\">\n          <a href=\"https://legacyparksports.leagueapps.com\"\
    \ target=\"_blank\" class=\"btn btn-green\">Register (Resident) →</a>\n      \
    \    <a href=\"https://legacyparksports.leagueapps.com\" target=\"_blank\" class=\"\
    btn btn-outline\">Register (Non-Resident) →</a>\n        </div>\n      </div>\n\
    \    </div>\n\n    <!-- YOUTH SOCCER -->\n    <div class=\"sport-card\" id=\"\
    youth-soccer\">\n      <div class=\"sport-header\">\n        <div class=\"sport-icon\"\
    >\U0001F45F</div>\n        <div>\n          <div class=\"sport-title\">Youth Soccer</div>\n\
    \          <div class=\"sport-sub\">Spring 2026 season now open</div>\n      \
    \  </div>\n        <div style=\"margin-left:auto\"><span class=\"badge-blue badge\"\
    >Spring 2026 Open</span></div>\n      </div>\n      <div class=\"sport-body\"\
    >\n        <p>Youth soccer spring 2026 registration is now open. Practices and\
    \ games will not begin until March — the Town Green is currently undergoing repairs\
    \ and will not be available until that time.</p>\n        <p>Non-residents: due\
    \ to guest ratio limits, team placement is not guaranteed until rosters are complete.\
    \ A refund will be issued if non-residents are not placed on a team in the requested\
    \ division (2% processing fee applies).</p>\n        <div class=\"sport-details\"\
    >\n          <div class=\"sport-detail\"><h4>Registration Opens</h4><p>Residents:\
    \ January 5, 2026<br>Non-Residents: January 19, 2026</p></div>\n          <div\
    \ class=\"sport-detail\"><h4>Season Start</h4><p>Practices &amp; games begin March\
